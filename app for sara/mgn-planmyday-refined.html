<style>
.wrap{--pg:#ECE7EA;--tx:#2B2532;font-family:"SF Pro Text","Segoe UI",system-ui,-apple-system,sans-serif;background:var(--pg);min-height:100vh;padding:34px 22px 60px;color:var(--tx)}
@media (prefers-color-scheme:dark){.wrap{--pg:#141018;--tx:#F3ECF1}}
:root[data-theme="dark"] .wrap{--pg:#141018;--tx:#F3ECF1}
:root[data-theme="light"] .wrap{--pg:#ECE7EA;--tx:#2B2532}
.head{max-width:860px;margin:0 auto 26px}
.head .k{font-family:ui-rounded,"SF Pro Rounded",system-ui;font-weight:700;font-size:12px;color:#EE5D8C;margin:0 0 6px}
.head h1{font-family:ui-rounded,"SF Pro Rounded",system-ui;font-weight:800;letter-spacing:-.02em;font-size:25px;margin:0}
.head p{margin:8px 0 0;font-size:13.5px;opacity:.72;max-width:600px;line-height:1.55}
.grid{max-width:860px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:26px 24px;justify-items:center}
.col{display:flex;flex-direction:column;gap:11px;width:100%;max-width:372px}
.stage{background:rgba(255,255,255,.5);border-radius:30px;padding:16px;display:flex;justify-content:center}
@media (prefers-color-scheme:dark){.stage{background:rgba(255,255,255,.04)}}
.tag .n{font-family:ui-rounded,"SF Pro Rounded",system-ui;font-weight:800;font-size:15px;padding-left:4px}
.tag .d{font-size:12px;opacity:.64;margin-top:1px;padding-left:4px}

.c{width:334px;min-height:158px;border-radius:26px;padding:20px;position:relative;overflow:hidden;font-family:ui-rounded,"SF Pro Rounded",system-ui,sans-serif;box-sizing:border-box;--cardbg:#E4DBFB;background:linear-gradient(145deg,#EFEAFE,#E2D6FB);color:#1A1220}
.c *{box-sizing:border-box}
.c .txt{position:relative;z-index:2;max-width:64%}
.c .h2{font-weight:800;font-size:30px;letter-spacing:-.03em;line-height:.92}
.c .sub{font-size:12px;margin-top:9px;opacity:.72;font-weight:600}
.avs{display:flex;align-items:center;margin-top:14px}
.avs .a{width:30px;height:30px;border-radius:50%;margin-left:-9px;border:2.5px solid var(--cardbg)}
.avs .a:first-child{margin-left:0}
.avs .more{width:30px;height:30px;border-radius:50%;margin-left:-9px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;background:#6A4BD1;border:2.5px solid var(--cardbg);z-index:3}
.art{position:absolute;right:2px;top:50%;transform:translateY(-50%);width:150px;height:150px;z-index:1}
.art svg{width:100%;height:100%}
.art.d3 svg{filter:drop-shadow(0 12px 16px rgba(80,30,80,.24))}
</style>

<div class="wrap">
  <div class="head">
    <p class="k">mgn radar · "Plan my day" — refined graphics</p>
    <h1>Same card, more modern shapes</h1>
    <p>Dropped the cutesy flower. Same Daily-Challenge layout (bold title + friends), four more grown-up graphic directions. Tell me a number — and whether you want it lighter or bolder.</p>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
const av=(g)=>`<span class="a" style="background:${g}"></span>`;
const avatars=`<div class="avs">${av('linear-gradient(135deg,#F4A87C,#B8607F)')}${av('linear-gradient(135deg,#8B6BE6,#4A2E9E)')}${av('linear-gradient(135deg,#5EC8F5,#2C6FE0)')}<span class="more">+4</span></div>`;

function blob(id){return `<svg viewBox="0 0 120 120"><defs><radialGradient id="b${id}" cx="34%" cy="28%" r="82%"><stop offset="0" stop-color="#F7B0D2"/><stop offset=".5" stop-color="#C765AE"/><stop offset="1" stop-color="#6A4BD1"/></radialGradient></defs><path d="M95 44c9 15 8 39-6 51s-40 13-56 3-19-37-9-54 28-24 44-21 18 6 27 21Z" fill="url(#b${id})"/></svg>`;}
function cluster(id){return `<svg viewBox="0 0 120 120"><defs>
  <linearGradient id="t${id}" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#CBB8F8"/><stop offset="1" stop-color="#6A4BD1"/></linearGradient>
  <radialGradient id="sp${id}" cx="34%" cy="28%" r="80%"><stop offset="0" stop-color="#FFB8D6"/><stop offset="1" stop-color="#DE4A7E"/></radialGradient>
  <linearGradient id="cu${id}" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F8DBA6"/><stop offset="1" stop-color="#E3902F"/></linearGradient></defs>
  <circle cx="42" cy="52" r="26" fill="none" stroke="url(#t${id})" stroke-width="15"/>
  <rect x="58" y="24" width="40" height="40" rx="13" fill="url(#cu${id})" transform="rotate(14 78 44)"/>
  <circle cx="82" cy="86" r="21" fill="url(#sp${id})"/></svg>`;}
function bauhaus(id){return `<svg viewBox="0 0 120 120">
  <circle cx="52" cy="60" r="36" fill="#6A4BD1"/>
  <path d="M52 24 A36 36 0 0 1 88 60 L52 60 Z" fill="#EE5D8C"/>
  <circle cx="96" cy="30" r="15" fill="#F4C531"/>
  <rect x="14" y="92" width="40" height="15" rx="7.5" fill="#EE5D8C"/></svg>`;}
function arcs(id){return `<svg viewBox="0 0 120 120"><defs><linearGradient id="ar${id}" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#6A4BD1"/><stop offset="1" stop-color="#EE5D8C"/></linearGradient></defs>
  <g fill="none" stroke-linecap="round"><path d="M18 100 A58 58 0 0 1 100 18" stroke="url(#ar${id})" stroke-width="13"/><path d="M36 102 A46 46 0 0 1 102 36" stroke="#C9B6F7" stroke-width="11"/><path d="M56 104 A30 30 0 0 1 104 56" stroke="#EE5D8C" stroke-width="10"/></g><circle cx="104" cy="104" r="7" fill="#6A4BD1"/></svg>`;}

const cards=[
  ["d3","1 · Soft blob","One elegant 3D pebble — calm, premium",blob(1)],
  ["d3","2 · 3D cluster","Ring + block + sphere, varied (not symmetric)",cluster(2)],
  ["flat","3 · Bauhaus flat","Flat geometric shapes — graphic, no 3D",bauhaus(3)],
  ["flat","4 · Radar arcs","Concentric arcs — nods to the 'radar' name",arcs(4)],
];
document.getElementById('grid').innerHTML=cards.map(([cls,n,d,art])=>`
  <div class="col"><div class="stage">
    <div class="c">
      <div class="txt"><div class="h2">Plan my<br>day</div><div class="sub">4 friends are out near you</div>${avatars}</div>
      <div class="art ${cls}">${art}</div>
    </div>
  </div><div class="tag"><div class="n">${n}</div><div class="d">${d}</div></div></div>`).join('');
</script>
