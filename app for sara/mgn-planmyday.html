<style>
.wrap{--pg:#ECE7EA;--tx:#2B2532;font-family:"SF Pro Text","Segoe UI",system-ui,-apple-system,sans-serif;background:var(--pg);min-height:100vh;padding:34px 22px 60px;color:var(--tx)}
@media (prefers-color-scheme:dark){.wrap{--pg:#141018;--tx:#F3ECF1}}
:root[data-theme="dark"] .wrap{--pg:#141018;--tx:#F3ECF1}
:root[data-theme="light"] .wrap{--pg:#ECE7EA;--tx:#2B2532}
.head{max-width:820px;margin:0 auto 26px}
.head .k{font-family:ui-rounded,"SF Pro Rounded",system-ui;font-weight:700;font-size:12px;color:#EE5D8C;margin:0 0 6px}
.head h1{font-family:ui-rounded,"SF Pro Rounded",system-ui;font-weight:800;letter-spacing:-.02em;font-size:25px;margin:0}
.head p{margin:8px 0 0;font-size:13.5px;opacity:.72;max-width:560px;line-height:1.55}
.grid{max-width:820px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:26px 24px;justify-items:center}
.col{display:flex;flex-direction:column;gap:11px;width:100%;max-width:360px}
.stage{background:var(--surface2,rgba(255,255,255,.5));border-radius:30px;padding:16px;display:flex;justify-content:center}
@media (prefers-color-scheme:dark){.stage{background:rgba(255,255,255,.04)}}
.tag{padding-left:4px}
.tag .n{font-family:ui-rounded,"SF Pro Rounded",system-ui;font-weight:800;font-size:15px}
.tag .d{font-size:12px;opacity:.64;margin-top:1px}

/* ---- base card ---- */
.c{width:328px;border-radius:24px;padding:20px;position:relative;overflow:hidden;font-family:"SF Pro Text",system-ui,sans-serif;isolation:isolate}
.c *{box-sizing:border-box}
.c .eye{font-family:ui-rounded,"SF Pro Rounded",system-ui;font-weight:700;font-size:11.5px;position:relative;z-index:2}
.c .h2{font-family:ui-rounded,"SF Pro Rounded",system-ui;font-weight:800;letter-spacing:-.02em;font-size:27px;line-height:1;margin:7px 0 0;position:relative;z-index:2}
.c .sub{margin-top:8px;font-size:12px;line-height:1.4;max-width:66%;position:relative;z-index:2;opacity:.9}
.c .go{margin-top:15px;display:inline-flex;align-items:center;gap:7px;font-family:ui-rounded,"SF Pro Rounded",system-ui;font-weight:800;font-size:12.5px;padding:11px 16px;border-radius:13px;position:relative;z-index:2}
.c .go svg{width:14px;height:14px}
.c .heart{position:absolute;right:20px;bottom:16px;width:74px;height:68px;z-index:1}

/* ---- V1 soft dreamy ---- */
.v-soft{background:linear-gradient(145deg,#EFEAFE,#E4DBFB 60%,#F6DCEC);color:#3A2C57}
.v-soft .eye{color:#6A4BD1}.v-soft .go{background:#2B2532;color:#fff}
/* ---- V2 dark glow ---- */
.v-dark{background:#160F22;color:#fff}
.v-dark::before{content:"";position:absolute;right:-30px;top:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,#FF4D8890,#7A2AE200 70%);filter:blur(6px);z-index:0}
.v-dark::after{content:"";position:absolute;left:-40px;bottom:-50px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,#6A2AE288,transparent 70%);filter:blur(8px);z-index:0}
.v-dark .eye{color:#E9B8FF}.v-dark .go{background:#fff;color:#2A0E1C}.v-dark .sub{opacity:.72}
/* ---- V3 minimal ---- */
.v-min{background:#fff;color:#14121A;border:1px solid #EBEAEF}
:root[data-theme="dark"] .v-min,@media (prefers-color-scheme:dark){}
.v-min .eye{color:#EE5D8C}.v-min .go{background:#14121A;color:#fff}.v-min .sub{opacity:.55}
.v-min .h2{font-weight:800}
/* ---- V4 bold ---- */
.v-bold{background:linear-gradient(140deg,#7A22E0,#C81FA0 55%,#FF2D6E);color:#fff}
.v-bold .eye{color:#FFD9EE}.v-bold .go{background:#fff;color:#C81FA0}.v-bold .h2{font-size:30px}
/* ---- V5 mesh dreamy ---- */
.v-mesh{background:
  radial-gradient(120px 120px at 82% 20%,#FFC7E0,transparent 60%),
  radial-gradient(150px 150px at 10% 90%,#C6B7F7,transparent 62%),
  radial-gradient(130px 130px at 60% 60%,#FFE0C2,transparent 60%),
  linear-gradient(140deg,#EFE7FF,#FCE4EE);color:#40315E}
.v-mesh .eye{color:#8A4BD1}.v-mesh .go{background:#40315E;color:#fff}
/* ---- V6 flat one-color ---- */
.v-flat{background:#6A4BD1;color:#fff}
.v-flat .eye{color:#D8CBFF}.v-flat .go{background:#fff;color:#6A4BD1}.v-flat .sub{opacity:.78}
/* ---- V7 glass / frosted over photo ---- */
.v-glass{background:linear-gradient(140deg,#7C5CD8,#B57BE0 45%,#F3A0C4);color:#fff}
.v-glass .panel{position:relative;z-index:2}
.v-glass .go{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.5);color:#fff;backdrop-filter:blur(6px)}
.v-glass .eye{color:#fff;opacity:.85}
/* ---- V8 outline / editorial ---- */
.v-line{background:#FBF7F9;color:#2B2532;border:1.5px solid #2B2532}
.v-line .eye{color:#EE5D8C;letter-spacing:.06em;text-transform:uppercase;font-size:10px}
.v-line .h2{font-size:29px}
.v-line .go{background:transparent;color:#2B2532;border:1.5px solid #2B2532}
</style>

<div class="wrap">
  <div class="head">
    <p class="k">mgn radar · "Plan my day" card</p>
    <h1>Pick a style for the hero card</h1>
    <p>Just the "Plan my day" card, shown 8 ways. Tell me the number (or mix ideas) and I'll drop it into the Home screen. Everything else stays the same.</p>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
const heart=(fill,stroke)=>`<svg class="heart" viewBox="0 0 100 92"><path d="M50 84C20 62 5 47 5 28 5 14 16 5 29 5c9 0 16 5 21 13 5-8 12-13 21-13 13 0 24 9 24 23 0 19-15 34-45 56Z" fill="${fill}"/><circle cx="39" cy="41" r="4.8" fill="${stroke}"/><circle cx="61" cy="41" r="4.8" fill="${stroke}"/><path d="M39 55c6 6 16 6 22 0" stroke="${stroke}" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`;
const arrow='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
const card=(cls,ht)=>`<div class="c ${cls}"><div class="eye">6 picks near you today</div><div class="h2">Plan my day</div><div class="sub">We lined up your evening around what you love.</div><div class="go">Build my plan ${arrow}</div>${ht}</div>`;
const items=[
 ["1 · Soft & dreamy","Pastel gradient, dark pill — current",card("v-soft",heart("#FF9EC4","#fff"))],
 ["2 · Dark & glow","Near-black with a soft pink/purple glow",card("v-dark",heart("#FF7CA6","#160F22"))],
 ["3 · Minimal","White, thin border, one accent",card("v-min",heart("#FBD3E2","#EE5D8C"))],
 ["4 · Bold","Vivid pink→purple, big type",card("v-bold",heart("#fff","#C81FA0"))],
 ["5 · Mesh dreamy","Multi-color soft mesh, airy",card("v-mesh",heart("#FF9EC4","#fff"))],
 ["6 · Flat one-color","Single solid purple, clean",card("v-flat",heart("#fff","#6A4BD1"))],
 ["7 · Glass CTA","Gradient with frosted button",card("v-glass",heart("#fff","#B57BE0"))],
 ["8 · Editorial line","Light, outlined, magazine feel",card("v-line",heart("#FBD3E2","#EE5D8C"))],
];
document.getElementById('grid').innerHTML=items.map(([n,d,c])=>`<div class="col"><div class="stage">${c}</div><div class="tag"><div class="n">${n}</div><div class="d">${d}</div></div></div>`).join('');
</script>
